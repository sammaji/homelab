# SSL settings at http level - prevents "protocol options redefined" warnings
# that occur when these are repeated across multiple server blocks on port 443.
# Certbot manages /etc/letsencrypt/options-ssl-nginx.conf but including it in
# each server block is what triggers the warnings; this replaces that pattern.
ssl_session_cache         shared:le_nginx_SSL:10m;
ssl_session_timeout       1440m;
ssl_session_tickets       off;
ssl_protocols             TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers               "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
ssl_dhparam               /etc/letsencrypt/ssl-dhparams.pem;
