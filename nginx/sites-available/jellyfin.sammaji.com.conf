# ----------------------------------------------------------------------
# HTTP to HTTPS REDIRECT
# ----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name jellyfin.sammaji.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------
# HTTPS CONFIGURATION
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jellyfin.sammaji.com;

    ssl_certificate     /etc/letsencrypt/live/jellyfin.sammaji.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jellyfin.sammaji.com/privkey.pem; # managed by Certbot

    # Allow large uploads (subtitle/sync) and stream without buffering to disk.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:5630;
        include /etc/nginx/snippets/proxy-headers.conf;

        # WebSocket upgrade — required for Jellyfin live playback/sessions.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
    }
}
