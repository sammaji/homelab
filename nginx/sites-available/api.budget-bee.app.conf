# ----------------------------------------------------------------------
# HTTP to HTTPS REDIRECT
# ----------------------------------------------------------------------
server {
    if ($host = api.budget-bee.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api.budget-bee.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

# ----------------------------------------------------------------------
# HTTPS CONFIGURATION
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.budget-bee.app;

    ssl_certificate /etc/letsencrypt/live/api.budget-bee.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.budget-bee.app/privkey.pem; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:5101;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
}
