# ----------------------------------------------------------------------
# HTTP to HTTPS REDIRECT
# ----------------------------------------------------------------------
server {
    if ($host = n8n.sammaji.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name n8n.sammaji.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------
# HTTPS CONFIGURATION
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.sammaji.com;

    location / {
        proxy_pass http://127.0.0.1:5640;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    ssl_certificate /etc/letsencrypt/live/n8n.sammaji.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/n8n.sammaji.com/privkey.pem; # managed by Certbot
}
