services:
  # ── otel collector ──
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: hlab-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    configs:
      - source: otel-collector-config
        target: /etc/otelcol/config.yaml
    ports:
      - "5603:4317" # OTLP gRPC
      - "5604:4318" # OTLP HTTP
      - "5605:8888" # internal metrics
      - "5606:9464" # prometheus exporter
      - "5607:13133" # health check
    networks:
      - otel-shared
    restart: unless-stopped
    depends_on:
      - tempo

  # ── Tempo ──
  tempo:
    image: grafana/tempo:2.6.1
    container_name: hlab-tempo
    command: ["-target=all", "-config.file=/etc/tempo.yaml"]
    configs:
      - source: tempo-config
        target: /etc/tempo.yaml
    ports:
      - "5602:3200"
    expose:
      - "4317"
    volumes:
      - hlab-tempo-data:/var/tempo
    networks:
      - otel-shared
    restart: unless-stopped

  # ── prometheus ──
  prometheus:
    image: prom/prometheus:latest
    container_name: hlab-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
      - "--enable-feature=exemplar-storage"
      - "--enable-feature=native-histograms"
    ports:
      - "5601:9090"
    volumes:
      - hlab-prometheus-data:/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    networks:
      - otel-shared
    depends_on:
      - otel-collector
      - cadvisor
    restart: unless-stopped

  # ── Grafana ──
  grafana:
    image: grafana/grafana:latest
    container_name: hlab-grafana
    ports:
      - "5600:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:?GF_SECURITY_ADMIN_USER is not set}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is not set}
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - hlab-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    configs:
      - source: hlab-grafana-datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - otel-shared
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

  # ── node exporter ──
  node-exporter:
    image: prom/node-exporter:latest
    container_name: hlab-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.netclass.ignored-devices=^(veth.*|br.*|docker.*|virbr.*|lo)$$"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - otel-shared
    restart: unless-stopped
    expose:
      - "9100"

  # ── cadvisor ──
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: hlab-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - otel-shared
    restart: unless-stopped
    expose:
      - "8080"

# ── inline configs ──
configs:
  otel-collector-config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

      processors:
        batch:

      exporters:
        prometheus:
          endpoint: 0.0.0.0:9464
          namespace: otel
          const_labels:
            source: otelcol

        otlp/tempo:
          endpoint: tempo:4317
          tls:
            insecure: true

        debug:
          verbosity: detailed

      extensions:
        health_check:
          endpoint: 0.0.0.0:13133

      service:
        extensions: [health_check]
        telemetry:
          logs:
            level: warn
        pipelines:
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug, otlp/tempo]
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug, prometheus]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug]

  tempo-config:
    content: |
      server:
        http_listen_port: 3200
        log_level: info

      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317

      storage:
        trace:
          backend: local
          wal:
            path: /var/tempo/wal
          local:
            path: /var/tempo/blocks

  prometheus-config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: "prometheus"
          static_configs:
            - targets: ["localhost:9090"]
        - job_name: "otelcol-internal"
          static_configs:
            - targets: ["otel-collector:8888"]
        - job_name: "otelcol-exporter"
          static_configs:
            - targets: ["otel-collector:9464"]
        - job_name: "tempo"
          static_configs:
            - targets: ["tempo:3200"]
        - job_name: "node-exporter"
          static_configs:
            - targets: ["node-exporter:9100"]
        - job_name: "cadvisor"
          static_configs:
            - targets: ["cadvisor:8080"]

  hlab-grafana-datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          uid: ds-prometheus
          type: prometheus
          access: proxy
          orgId: 1
          url: http://prometheus:9090
          isDefault: true
          editable: true
        - name: Tempo
          uid: tempo
          type: tempo
          access: proxy
          orgId: 1
          url: http://tempo:3200
          editable: true
          jsonData:
            tracesToMetrics:
              datasourceUid: ds-prometheus
            nodeGraph:
              enabled: true
            serviceMap:
              enabled: true

networks:
  otel-shared:
    name: hlab-otel-shared
    driver: bridge

volumes:
  hlab-prometheus-data:
    name: hlab-prometheus-data
    driver: local
  hlab-grafana-data:
    name: hlab-grafana-data
    driver: local
  hlab-tempo-data:
    name: hlab-tempo-data
    driver: local
