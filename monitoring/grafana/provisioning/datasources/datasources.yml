apiVersion: 1
datasources:
  - name: Prometheus
    uid: ds-prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToMetrics:
        datasourceUid: ds-prometheus
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true
