services:
  n8n-postgres:
    image: postgres:18-alpine
    container_name: hlab-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DATABASE:?environment variable N8N_POSTGRES_DATABASE is not set.}
      POSTGRES_USER: ${N8N_POSTGRES_USER:?environment variable N8N_POSTGRES_USER is not set.}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:?environment variable N8N_POSTGRES_PASSWORD is not set.}
      POSTGRES_HOST_AUTH_METHOD: md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - n8n-postgres-data:/var/lib/postgresql
    networks:
      - n8n-net

  n8n:
    image: n8nio/n8n:latest
    container_name: hlab-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DATABASE:?environment variable N8N_POSTGRES_DATABASE is not set.}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:?environment variable N8N_POSTGRES_USER is not set.}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:?environment variable N8N_POSTGRES_PASSWORD is not set.}
      DB_POSTGRESDB_SCHEMA: public
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?environment variable N8N_ENCRYPTION_KEY is not set.}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_METRICS: "true"
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_ONBOARDING_FLOW_DISABLED: ${N8N_ONBOARDING_FLOW_DISABLED:-true}
      GENERIC_TIMEZONE: Asia/Kolkata
      TZ: Asia/Kolkata
    depends_on:
      n8n-postgres:
        condition: service_healthy
    ports:
      - 5640:5678
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:5678/healthz || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - n8n-net

volumes:
  n8n-data:
    name: hlab-n8n-data
  n8n-postgres-data:
    name: hlab-n8n-postgres-data

networks:
  n8n-net:
    name: hlab-n8n-net
    driver: bridge
